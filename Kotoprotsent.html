<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Котик скидок</title>
<style>
:root{
  --bg:#f3fbff;--card-bg:#fff;--text:#1a1a2e;--sub:#6b6b7a;
  --shadow:rgba(0,0,0,0.08);--input-bg:#fff;--input-border:#ddd;
  --result-bg:#e3f2fd;--accent:#64b5f6;--accent-dark:#1e88e5;
  --tag-bg:#e3f2fd;--tag-color:#1e3a5f;--mode-bg:#e3f2fd;
}
[data-theme="dark"]{
  --bg:#111820;--card-bg:#1a2330;--text:#e8f4ff;--sub:#7a9ab8;
  --shadow:rgba(0,0,0,0.5);--input-bg:#1f2e3d;--input-border:#2d3f52;
  --result-bg:#1f2e3d;--accent:#4fa3e0;--accent-dark:#64b5f6;
  --tag-bg:#1f2e3d;--tag-color:#90caf9;--mode-bg:#1f2e3d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:16px 16px 40px;
  transition:background .3s,color .3s;
}
.top-bar{
  width:100%;max-width:420px;display:flex;
  justify-content:space-between;align-items:center;margin-bottom:16px;
}
.back-btn,.theme-btn{
  background:var(--card-bg);border:1px solid var(--accent);
  border-radius:999px;padding:6px 14px;font-size:13px;
  color:var(--text);cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;
  transition:background .2s;
}
.back-btn:hover,.theme-btn:hover{background:var(--tag-bg);}
.cat-card{
  background:var(--card-bg);border-radius:24px;
  box-shadow:0 12px 30px var(--shadow);
  padding:20px 20px 24px;width:100%;max-width:420px;
  transition:background .3s;
}
.cat-face{
  position:relative;width:120px;height:100px;
  margin:0 auto 12px;pointer-events:none;
}
.cat-head{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#bbdefb,#90caf9);
  border-radius:60px 60px 50px 50px;
  box-shadow:0 6px 14px var(--shadow);
}
.cat-ear{
  position:absolute;width:38px;height:38px;
  background:#bbdefb;clip-path:polygon(50% 0,0 100%,100% 100%);top:-14px;
}
.cat-ear.left{left:6px;transform:rotate(-8deg);}
.cat-ear.right{right:6px;transform:rotate(8deg);}
.cat-ear-inner{
  position:absolute;inset:8px 9px 6px;
  background:#e3f2fd;clip-path:polygon(50% 0,0 100%,100% 100%);
}
.cat-eye{
  position:absolute;top:36px;width:16px;height:20px;
  background:#fff;border-radius:50%;overflow:hidden;
}
.cat-eye.left{left:34px;}
.cat-eye.right{right:34px;}
.cat-nose{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  width:13px;height:10px;background:#ff8a80;
  border-radius:50% 50% 60% 60%;
}
.cat-mouth{
  position:absolute;top:66px;left:50%;
  width:24px;height:14px;transform:translateX(-50%);
}
.cat-mouth::before,.cat-mouth::after{
  content:"";position:absolute;width:12px;height:9px;
  border-bottom:2px solid #5d4037;border-radius:0 0 12px 12px;top:0;
}
.cat-mouth::before{right:50%;border-right:2px solid #5d4037;}
.cat-mouth::after{left:50%;border-left:2px solid #5d4037;}
.cat-whisker{position:absolute;width:30px;height:1px;background:#5d4037;top:60px;}
.cat-whisker.left1{left:12px;transform:rotate(6deg);}
.cat-whisker.left2{left:14px;top:67px;transform:rotate(-4deg);}
.cat-whisker.right1{right:12px;transform:rotate(-6deg);}
.cat-whisker.right2{right:14px;top:67px;transform:rotate(4deg);}
.cat-paws{display:flex;justify-content:center;gap:16px;margin-top:78px;}
.cat-paw{
  width:36px;height:22px;background:#bbdefb;
  border-radius:18px 18px 14px 14px;
  box-shadow:0 3px 0 rgba(0,0,0,0.08);
  position:relative;animation:paw-bounce 1.2s infinite ease-in-out;
}
.cat-paw.right{animation-delay:.2s;}
.cat-paw::after{
  content:"";position:absolute;width:8px;height:8px;
  background:#bbdefb;border-radius:50%;bottom:-3px;left:4px;
  box-shadow:9px 0 0 #bbdefb,18px 0 0 #bbdefb;
}
@keyframes paw-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
.title{text-align:center;font-weight:700;margin-bottom:4px;font-size:17px;}
.subtitle{text-align:center;font-size:12px;color:var(--sub);margin-bottom:14px;}
.mode-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.mode-btn{
  flex:1 1 calc(50% - 3px);font-size:12px;padding:7px 6px;
  border-radius:999px;border:1px solid var(--accent);
  background:var(--mode-bg);color:var(--text);
  cursor:pointer;transition:background .2s,color .2s;
}
.mode-btn.active{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:3px;}
.field input{
  width:100%;padding:7px 9px;border-radius:10px;
  border:1px solid var(--input-border);
  background:var(--input-bg);color:var(--text);
  font-size:14px;outline:none;transition:border-color .2s;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(100,181,246,0.2);
}
.result{
  background:var(--result-bg);border-radius:12px;
  padding:12px 14px;margin-top:4px;
}
.result-main{font-weight:700;font-size:16px;margin-bottom:4px;}
.result-sub{font-size:12px;color:var(--sub);line-height:1.5;white-space:pre-line;}
.hint{font-size:11px;color:var(--sub);text-align:center;margin-top:10px;}
</style>
</head>
<body>

<div class="top-bar">
  <a href="Index.html" class="back-btn">← Назад</a>
  <button class="theme-btn" id="themeBtn">🌙 Тёмная</button>
</div>

<div class="cat-card">
  <div class="cat-face">
    <div class="cat-head"></div>
    <div class="cat-ear left"><div class="cat-ear-inner"></div></div>
    <div class="cat-ear right"><div class="cat-ear-inner"></div></div>
    <div class="cat-eye left"></div>
    <div class="cat-eye right"></div>
    <div class="cat-nose"></div>
    <div class="cat-mouth"></div>
    <div class="cat-whisker left1"></div>
    <div class="cat-whisker left2"></div>
    <div class="cat-whisker right1"></div>
    <div class="cat-whisker right2"></div>
    <div class="cat-paws">
      <div class="cat-paw left"></div>
      <div class="cat-paw right"></div>
    </div>
  </div>

  <div class="title">Котик скидок</div>
  <div class="subtitle">Считает проценты и рубли</div>

  <div class="mode-tabs">
    <button class="mode-btn active" data-mode="discount">Скидка</button>
    <button class="mode-btn" data-mode="markup">Наценка</button>
    <button class="mode-btn" data-mode="percentof">Процент от</button>
    <button class="mode-btn" data-mode="fromto">Из А в Б</button>
  </div>

  <div id="fields"></div>

  <div class="result">
    <div class="result-main" id="resMain">Кот ждёт числа…</div>
    <div class="result-sub" id="resSub">Введи значения выше.</div>
  </div>

  <div class="hint">Для урока финансовой грамотности и не только.</div>
</div>

<script>
const root = document.documentElement;
const themeBtn = document.getElementById('themeBtn');

if (localStorage.getItem('theme') === 'dark') {
  root.setAttribute('data-theme', 'dark');
  themeBtn.textContent = '☀️ Светлая';
}
themeBtn.addEventListener('click', () => {
  const dark = root.getAttribute('data-theme') === 'dark';
  if (dark) {
    root.removeAttribute('data-theme');
    themeBtn.textContent = '🌙 Тёмная';
    localStorage.setItem('theme', 'light');
  } else {
    root.setAttribute('data-theme', 'dark');
    themeBtn.textContent = '☀️ Светлая';
    localStorage.setItem('theme', 'dark');
  }
});

document.querySelectorAll('.cat-eye').forEach(eye => {
  const p = document.createElement('div');
  Object.assign(p.style, {
    position: 'absolute', width: '10px', height: '14px',
    background: '#333', borderRadius: '50%',
    top: '3px', left: '3px', transition: 'transform .1s'
  });
  eye.appendChild(p);
});

document.addEventListener('mousemove', e => {
  const r = document.querySelector('.cat-face').getBoundingClientRect();
  const dx = (e.clientX - (r.left + r.width / 2)) / 80;
  const dy = (e.clientY - (r.top + r.height / 2)) / 80;
  document.querySelectorAll('.cat-eye div').forEach(p => {
    p.style.transform = `translate(${dx}px,${dy}px)`;
  });
});

function fmt(n) {
  if (!isFinite(n)) return '0';
  return n.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

const modes = {
  discount: {
    fields: `
      <div class="field">
        <label>Исходная цена (₽)</label>
        <input type="number" id="f1" value="1000" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Скидка (%)</label>
        <input type="number" id="f2" value="10" min="0" max="100" step="0.1">
      </div>`,
    calc() {
      const price = parseFloat(document.getElementById('f1').value) || 0;
      const pct   = parseFloat(document.getElementById('f2').value) || 0;
      const disc  = price * pct / 100;
      return {
        main: `Новая цена: ${fmt(price - disc)} ₽`,
        sub:  `Скидка: ${fmt(disc)} ₽\n(${fmt(pct)}% от ${fmt(price)} ₽)`
      };
    }
  },
  markup: {
    fields: `
      <div class="field">
        <label>Себестоимость (₽)</label>
        <input type="number" id="f1" value="1000" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Наценка (%)</label>
        <input type="number" id="f2" value="20" min="0" step="0.1">
      </div>`,
    calc() {
      const price = parseFloat(document.getElementById('f1').value) || 0;
      const pct   = parseFloat(document.getElementById('f2').value) || 0;
      const add   = price * pct / 100;
      return {
        main: `Итоговая цена: ${fmt(price + add)} ₽`,
        sub:  `Наценка: ${fmt(add)} ₽\n(${fmt(pct)}% от ${fmt(price)} ₽)`
      };
    }
  },
  percentof: {
    fields: `
      <div class="field">
        <label>Часть (₽)</label>
        <input type="number" id="f1" value="200" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Целое (₽)</label>
        <input type="number" id="f2" value="1000" min="0" step="0.01">
      </div>`,
    calc() {
      const part  = parseFloat(document.getElementById('f1').value) || 0;
      const whole = parseFloat(document.getElementById('f2').value) || 0;
      const pct   = whole === 0 ? 0 : part / whole * 100;
      return {
        main: `Это ${fmt(pct)}%`,
        sub:  `${fmt(part)} ₽ от ${fmt(whole)} ₽`
      };
    }
  },
  fromto: {
    fields: `
      <div class="field">
        <label>Старая цена (₽)</label>
        <input type="number" id="f1" value="1000" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Новая цена (₽)</label>
        <input type="number" id="f2" value="1200" min="0" step="0.01">
      </div>`,
    calc() {
      const oldP = parseFloat(document.getElementById('f1').value) || 0;
      const newP = parseFloat(document.getElementById('f2').value) || 0;
      if (oldP === 0) {
        return {
          main: 'Котик растерялся…',
          sub:  'Нужна ненулевая старая цена.'
        };
      }
      const change = newP - oldP;
      const pct = change / oldP * 100;
      const dir = change >= 0 ? 'увеличение' : 'снижение';
      return {
        main: `${dir.charAt(0).toUpperCase()+dir.slice(1)} на ${fmt(Math.abs(pct))}%`,
        sub:  `${dir === 'увеличение' ? 'Надо добавить' : 'Надо уменьшить'} ${fmt(Math.abs(change))} ₽\nиз ${fmt(oldP)} ₽ в ${fmt(newP)} ₽`
      };
    }
  }
};

const fieldsBox = document.getElementById('fields');
const resMain   = document.getElementById('resMain');
const resSub    = document.getElementById('resSub');

function recalc(modeKey) {
  const mode = modes[modeKey];
  const { main, sub } = mode.calc();
  resMain.textContent = main;
  resSub.textContent  = sub;
}

function render(modeKey) {
  const mode = modes[modeKey];
  fieldsBox.innerHTML = mode.fields;
  recalc(modeKey);
  fieldsBox.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => recalc(modeKey));
  });
}

const modeButtons = document.querySelectorAll('.mode-btn');
let currentMode = 'discount';

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mode;
    currentMode = m;
    modeButtons.forEach(b => b.classList.toggle('active', b === btn));
    render(m);
  });
});

render(currentMode);
</script>
</body>
</html>
